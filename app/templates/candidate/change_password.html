{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-xl-5 col-lg-6 col-md-8 col-12">

<h3 class="fw-bold mb-4">

<i class="bi bi-lock"></i>
Change Password

</h3>

<div class="card password-card">

<div class="card-body">

<form method="POST">

<!-- CURRENT PASSWORD -->

<div class="form-group">

<label class="form-label fw-semibold">

Current Password

</label>

<input type="password"
name="current_password"
class="form-control"
required>

</div>

<!-- NEW PASSWORD -->

<div class="form-group">

<label class="form-label fw-semibold">

New Password

</label>

<input type="password"
name="new_password"
class="form-control"
required>

</div>

<!-- CONFIRM PASSWORD -->

<div class="form-group">

<label class="form-label fw-semibold">

Confirm Password

</label>

<input type="password"
name="confirm_password"
class="form-control"
required>

</div>

<!-- BUTTON -->

<div class="form-buttons">

<button class="btn btn-warning update-btn">

<i class="bi bi-check-circle"></i>
Update Password

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- STYLE -->

<style>

/* CARD */

.password-card{

border:none;
border-radius:14px;
padding:10px;
box-shadow:0 8px 22px rgba(0,0,0,0.06);

}


/* FORM GROUP */

.form-group{

margin-bottom:18px;

}


/* INPUT */

.form-control{

border-radius:8px;
padding:10px;

}

.form-control:focus{

box-shadow:none;
border-color:#0d6efd;

}


/* BUTTON */

.update-btn{

border-radius:8px;
padding:8px 16px;
transition:0.2s;

}

.update-btn:hover{

transform:translateY(-1px);

}


/* MOBILE */

@media(max-width:768px){

.password-card{

padding:5px;

}

.update-btn{

width:100%;

}

}

</style>

{% endblock %}
