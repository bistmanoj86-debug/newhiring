{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-xl-5 col-lg-6 col-md-8 col-12">

<h3 class="fw-bold mb-4">

<i class="bi bi-file-earmark-arrow-up"></i>
Update Resume

</h3>

<div class="card resume-card">

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<!-- FILE INPUT -->

<div class="form-group">

<label class="form-label fw-semibold">

Upload Resume (PDF / DOC / DOCX)

</label>

<input type="file"
name="resume"
class="form-control"
accept=".pdf,.doc,.docx"
required>

<small class="text-muted">
Maximum file size recommended: 2MB
</small>

</div>

<!-- BUTTON -->

<div class="mt-3">

<button class="btn btn-success upload-btn">

<i class="bi bi-upload"></i>
Upload Resume

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- STYLE -->

<style>

/* CARD */

.resume-card{

border:none;
border-radius:14px;
padding:10px;
box-shadow:0 8px 22px rgba(0,0,0,0.06);

}


/* FORM GROUP */

.form-group{

margin-bottom:18px;

}


/* INPUT */

.form-control{

border-radius:8px;
padding:10px;

}

.form-control:focus{

box-shadow:none;
border-color:#0d6efd;

}


/* BUTTON */

.upload-btn{

border-radius:8px;
padding:8px 16px;
transition:0.2s;

}

.upload-btn:hover{

transform:translateY(-1px);

}


/* MOBILE */

@media(max-width:768px){

.upload-btn{

width:100%;

}

}

</style>

{% endblock %}
