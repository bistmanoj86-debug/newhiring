{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-xl-6 col-lg-7 col-md-9 col-12">

<h3 class="fw-bold mb-4">

<i class="bi bi-pencil-square"></i>
Edit Job

</h3>

<div class="card edit-job-card">

<div class="card-body">

<form method="POST">

<!-- JOB TITLE -->

<div class="form-group">

<label class="form-label fw-semibold">

Job Title

</label>

<input type="text"
name="title"
class="form-control"
value="{{ job.title }}"
required>

</div>

<!-- LOCATION -->

<div class="form-group">

<label class="form-label fw-semibold">

Location

</label>

<input type="text"
name="location"
class="form-control"
value="{{ job.location }}"
required>

</div>

<!-- SKILLS -->

<div class="form-group">

<label class="form-label fw-semibold">

Skills

</label>

<input type="text"
name="skills"
class="form-control"
value="{{ job.skills }}"
required>

<small class="text-muted">
Enter skills separated by commas
</small>

</div>

<!-- BUTTONS -->

<div class="form-buttons">

<button class="btn btn-primary update-btn">

<i class="bi bi-check-circle"></i>
Update Job

</button>

<a href="{{ url_for('recruiter.my_jobs') }}"
class="btn btn-outline-secondary cancel-btn">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<!-- STYLE -->

<style>

/* CARD */

.edit-job-card{

border:none;
border-radius:14px;
padding:10px;
box-shadow:0 8px 22px rgba(0,0,0,0.06);

}


/* FORM GROUP */

.form-group{

margin-bottom:18px;

}


/* INPUT */

.form-control{

border-radius:8px;
padding:10px;

}

.form-control:focus{

box-shadow:none;
border-color:#0d6efd;

}


/* BUTTON AREA */

.form-buttons{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;

}


/* UPDATE BUTTON */

.update-btn{

border-radius:8px;
padding:8px 16px;
transition:0.2s;

}

.update-btn:hover{

transform:translateY(-1px);

}


/* CANCEL BUTTON */

.cancel-btn{

border-radius:8px;

}


/* MOBILE */

@media(max-width:768px){

.form-buttons{

flex-direction:column;

}

.update-btn,
.cancel-btn{

width:100%;

}

}

</style>

{% endblock %}
