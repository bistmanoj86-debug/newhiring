{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center auth-page">

<div class="card auth-card">

<div class="text-center mb-3">

<h3 class="fw-bold">

<i class="bi bi-shield-lock"></i>
Forgot Password

</h3>

<p class="text-muted small">

Enter your registered email to reset your password

</p>

</div>

<form method="POST">

<div class="mb-3">

<label class="form-label fw-semibold">

Email Address

</label>

<input type="email"
name="email"
class="form-control form-control-lg"
placeholder="Enter your email"
required>

</div>

<button class="btn btn-primary w-100 send-btn">

<i class="bi bi-envelope"></i>
Send Reset Link

</button>

</form>

<hr class="my-4">

<div class="text-center">

<a href="{{ url_for('auth.login') }}"
class="back-login">

<i class="bi bi-arrow-left"></i>

Back to Login

</a>

</div>

</div>

</div>

<style>

/* PAGE CENTER */

.auth-page{

min-height:80vh;

}


/* CARD */

.auth-card{

max-width:420px;
width:100%;
padding:25px;
border:none;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);

}


/* INPUT */

.form-control{

border-radius:8px;
padding:10px;

}

.form-control:focus{

box-shadow:none;
border-color:#0d6efd;

}


/* BUTTON */

.send-btn{

border-radius:8px;
padding:10px;
font-weight:500;
transition:0.2s;

}

.send-btn:hover{

transform:translateY(-1px);

}


/* BACK LINK */

.back-login{

text-decoration:none;
font-size:14px;
color:#0d6efd;

}

.back-login:hover{

text-decoration:underline;

}


/* MOBILE */

@media(max-width:768px){

.auth-card{

padding:20px;

}

}

</style>

{% endblock %}
