{% extends "base.html" %}

{% block content %}

<div class="register-wrapper">

<div class="register-card">

<h3 class="register-title">

<i class="bi bi-person-plus"></i>
Create Account

</h3>

<form method="POST">

<div class="form-group">

<label>Email</label>

<input type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<div class="form-group">

<label>Password</label>

<input type="password"
name="password"
class="form-control"
placeholder="Create password"
required>

</div>

<div class="form-group">

<label>Role</label>

<select name="role" class="form-select">

<option value="candidate">

Candidate

</option>

<option value="recruiter">

Recruiter

</option>

</select>

</div>

<button type="submit" class="btn btn-success register-btn">

Register

</button>

</form>

<div class="login-link">

<p>

Already have an account?

<a href="{{ url_for('auth.login') }}">

Login

</a>

</p>

</div>

</div>

</div>

<style>

/* WRAPPER */

.register-wrapper{

display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
padding:20px;

}


/* CARD */

.register-card{

width:100%;
max-width:420px;
background:white;
padding:28px;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
transition:0.25s;

}

.register-card:hover{

transform:translateY(-3px);
box-shadow:0 16px 35px rgba(0,0,0,0.12);

}


/* TITLE */

.register-title{

text-align:center;
margin-bottom:22px;
font-weight:600;

}


/* FORM GROUP */

.form-group{

margin-bottom:14px;

}


/* INPUT */

.form-control,
.form-select{

border-radius:8px;
padding:10px;

}

.form-control:focus,
.form-select:focus{

box-shadow:none;
border-color:#0d6efd;

}


/* BUTTON */

.register-btn{

width:100%;
border-radius:8px;
padding:9px;
margin-top:6px;
transition:0.2s;

}

.register-btn:hover{

transform:translateY(-1px);

}


/* LOGIN LINK */

.login-link{

text-align:center;
margin-top:16px;
font-size:14px;

}

.login-link a{

font-weight:600;
text-decoration:none;

}


/* MOBILE */

@media(max-width:768px){

.register-card{

padding:22px;

}

.register-title{

font-size:20px;

}

}

</style>

{% endblock %}
