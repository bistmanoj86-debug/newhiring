{% extends "base.html" %}

{% block content %}

<div class="login-wrapper">

<div class="login-card">

<h3 class="login-title">

<i class="bi bi-person-circle"></i>
NewHiring Login

</h3>

<!-- EMAIL LOGIN -->

<form method="POST" action="{{ url_for('auth.login') }}">

<div class="form-group">

<label>Email</label>

<input type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

<div class="form-group">

<label>Password</label>

<input type="password"
name="password"
class="form-control"
placeholder="Enter your password"
required>

</div>

<button class="btn btn-primary login-btn">

Login

</button>

</form>

<div class="forgot-box">

<a href="{{ url_for('auth.forgot_password') }}">

Forgot Password?

</a>

</div>

<div class="divider">

<span>OR</span>

</div>

<!-- OTP LOGIN -->

<form method="POST" action="{{ url_for('auth.send_otp') }}">

<div class="form-group">

<label>Enter Mobile Number</label>

<input type="text"
name="phone"
class="form-control"
placeholder="Enter mobile number">

</div>

<button class="btn btn-success login-btn">

Send OTP

</button>

</form>

<!-- REGISTER LINK -->

<div class="register-box">

<p>

Don't have an account?

<a href="{{ url_for('auth.register') }}">

Register

</a>

</p>

</div>

</div>

</div>

<style>

/* WRAPPER */

.login-wrapper{

display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
padding:20px;

}


/* LOGIN CARD */

.login-card{

width:100%;
max-width:420px;
background:white;
padding:28px;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
transition:0.25s;

}

.login-card:hover{

transform:translateY(-3px);
box-shadow:0 16px 35px rgba(0,0,0,0.12);

}


/* TITLE */

.login-title{

text-align:center;
margin-bottom:22px;
font-weight:600;

}


/* FORM GROUP */

.form-group{

margin-bottom:14px;

}


/* INPUT */

.form-control{

border-radius:8px;
padding:10px;

}

.form-control:focus{

box-shadow:none;
border-color:#0d6efd;

}


/* BUTTON */

.login-btn{

width:100%;
border-radius:8px;
padding:9px;
margin-top:6px;
transition:0.2s;

}

.login-btn:hover{

transform:translateY(-1px);

}


/* FORGOT PASSWORD */

.forgot-box{

text-align:center;
margin-top:10px;

}

.forgot-box a{

text-decoration:none;
font-size:14px;

}


/* DIVIDER */

.divider{

text-align:center;
margin:22px 0;
position:relative;

}

.divider span{

background:white;
padding:0 12px;
color:#777;

}

.divider:before{

content:"";
position:absolute;
top:50%;
left:0;
width:100%;
height:1px;
background:#e5e5e5;
z-index:-1;

}


/* REGISTER */

.register-box{

text-align:center;
margin-top:15px;
font-size:14px;

}

.register-box a{

font-weight:600;
text-decoration:none;

}


/* MOBILE */

@media(max-width:768px){

.login-card{

padding:22px;

}

.login-title{

font-size:20px;

}

}

</style>

{% endblock %}
